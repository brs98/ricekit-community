# Tmux color theme — generated by ricekit
# source-file ~/.config/tmux/ricekit-colors.conf

# Status bar
set -g status-style "bg={{surface}},fg={{foreground}}"
set -g status-left-style "bg={{surface}},fg={{accent}},bold"
set -g status-right-style "bg={{surface}},fg={{muted}}"

# Pane borders
set -g pane-border-style "fg={{border}}"
set -g pane-active-border-style "fg={{accent}}"

# Window status
set -g window-status-style "fg={{muted}}"
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg={{accent}},fg={{contrast(accent)}},bold"
set -g window-status-activity-style "fg={{yellow}}"

# Messages and command prompt
set -g message-style "bg={{surface}},fg={{foreground}}"
set -g message-command-style "bg={{surface}},fg={{foreground}}"

# Copy/choice mode
set -g mode-style "bg={{blend(background, accent, 30%)}},fg={{foreground}}"

# Clock
set -g clock-mode-colour "{{accent}}"
