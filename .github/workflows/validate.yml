name: Validate Contributions

on:
  pull_request:
    paths:
      - 'themes/**'
      - 'templates/**'
      - 'validator/**'
  push:
    branches: [main]
    paths:
      - 'validator/**'

jobs:
  test:
    name: validator self-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: validator -> target
      - name: cargo test
        working-directory: validator
        run: cargo test --release

  validate:
    name: validate changed themes + configs
    runs-on: ubuntu-latest
    # Only run on PRs that actually touch content, not pure validator changes
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: validator -> target

      - name: Build validator
        working-directory: validator
        run: cargo build --release

      - name: Detect and validate changed contributions
        run: |
          set -euo pipefail

          ERRORS=0
          VALIDATOR=./validator/target/release/ricekit-validate

          CHANGED_THEMES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- themes/ | cut -d'/' -f1-2 | sort -u)
          CHANGED_CONFIGS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- templates/ | cut -d'/' -f1-2 | sort -u)

          if [ -z "$CHANGED_THEMES" ] && [ -z "$CHANGED_CONFIGS" ]; then
            echo "No theme or config directories changed."
            exit 0
          fi

          for dir in $CHANGED_THEMES; do
            if [ -d "$dir" ]; then
              echo "::group::Validating theme: $dir"
              if "$VALIDATOR" "$dir"; then
                echo "OK: $dir"
              else
                echo "::error::Validation failed for $dir"
                ERRORS=$((ERRORS + 1))
              fi
              echo "::endgroup::"
            fi
          done

          for dir in $CHANGED_CONFIGS; do
            if [ -d "$dir" ]; then
              echo "::group::Validating config: $dir"
              if "$VALIDATOR" "$dir"; then
                echo "OK: $dir"
              else
                echo "::error::Validation failed for $dir"
                ERRORS=$((ERRORS + 1))
              fi
              echo "::endgroup::"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::$ERRORS validation error(s) found."
            exit 1
          fi

          echo "All validations passed."
