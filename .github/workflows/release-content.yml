name: Release Content

on:
  push:
    tags:
      - 'content-v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish content tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#content-v}"
          MAJOR="$(echo "$VERSION" | cut -d. -f1)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major=$MAJOR" >> "$GITHUB_OUTPUT"
          echo "Publishing content version $VERSION (schema major $MAJOR)"

      - name: Sanity-check content layout and TOML parse
        run: |
          set -euo pipefail
          MISSING=0
          BROKEN=0

          for dir in themes/*/; do
            if [ ! -f "${dir}theme.toml" ]; then
              echo "::error file=${dir}::missing theme.toml"
              MISSING=$((MISSING + 1))
            fi
          done
          for dir in templates/*/; do
            if [ ! -f "${dir}config.toml" ]; then
              echo "::error file=${dir}::missing config.toml"
              MISSING=$((MISSING + 1))
            fi
          done

          for f in themes/*/theme.toml templates/*/config.toml; do
            python3 -c "import sys, tomllib; tomllib.load(open(sys.argv[1], 'rb'))" "$f" \
              || { echo "::error file=$f::TOML parse failed"; BROKEN=$((BROKEN + 1)); }
          done

          if [ $MISSING -gt 0 ] || [ $BROKEN -gt 0 ]; then
            echo "Aborting: $MISSING missing files, $BROKEN parse errors"
            exit 1
          fi

      - name: Build manifest.json
        run: |
          set -euo pipefail
          THEMES=$(find themes -mindepth 1 -maxdepth 1 -type d -printf "%f\n" | sort | jq -R . | jq -cs .)
          CONFIGS=$(find templates -mindepth 1 -maxdepth 1 -type d -printf "%f\n" | sort | jq -R . | jq -cs .)
          PUBLISHED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          cat > manifest.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "schema_major": ${{ steps.version.outputs.major }},
            "themes": ${THEMES},
            "configs": ${CONFIGS},
            "published_at": "${PUBLISHED}"
          }
          EOF
          jq . manifest.json

      - name: Build tarball and checksum
        run: |
          set -euo pipefail
          TAR="ricekit-content-v${{ steps.version.outputs.version }}.tar.gz"
          tar --sort=name --owner=0 --group=0 --numeric-owner \
            -czf "$TAR" themes/ templates/ manifest.json
          sha256sum "$TAR" | awk '{print $1}' > "$TAR.sha256"
          echo "Tarball: $(du -h "$TAR" | cut -f1)"
          echo "SHA256: $(cat "$TAR.sha256")"

      - name: Build Firefox XPI and checksum
        working-directory: extensions/firefox
        run: |
          set -euo pipefail
          make xpi
          XPI=$(ls dist/ricekit-theme-*.xpi)
          sha256sum "$XPI" | awk '{print $1}' > "$XPI.sha256"
          echo "XPI: $(du -h "$XPI" | cut -f1)"
          echo "SHA256: $(cat "$XPI.sha256")"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Ricekit Content ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ricekit-content-v*.tar.gz
            ricekit-content-v*.tar.gz.sha256
            manifest.json
            extensions/firefox/dist/ricekit-theme-*.xpi
            extensions/firefox/dist/ricekit-theme-*.xpi.sha256
